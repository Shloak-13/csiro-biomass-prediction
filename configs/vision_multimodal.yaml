extends: configs/base.yaml
image_size: 384
batch_size: 16
epochs: 30
gradient_accumulation_steps: 2
mixed_precision: true
ema: true
scheduler: cosine
augmentations:
  train:
    - resized_crop
    - horizontal_flip
    - vertical_flip
    - rotate90
    - color_jitter
    - coarse_dropout
  valid:
    - resize_center_crop
backbones:
  - efficientnetv2_s
  - convnextv2_base
  - swin_base
  - vit_base
  - eva02_base
fusion:
  - concat
  - gated
  - attention
  - cross_attention
